services:
  db:
    image: postgres:16-alpine
    container_name: soutien-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: soutien
      POSTGRES_PASSWORD: soutien_dev_password
      POSTGRES_DB: soutien
    ports:
      - "5433:5432"
    volumes:
      - soutien_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U soutien -d soutien"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  soutien_postgres_data:
